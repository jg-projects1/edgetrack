<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="MBEmpire"/>
<meta name="theme-color" content="#ffffff"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<title>MBEmpire</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f1012;min-height:100%;font-size:14px;color:#e8e8e4;-webkit-tap-highlight-color:transparent}
.app{display:flex;flex-direction:column;min-height:100svh}

.topbar{background:#1a1b1e;border-bottom:0.5px solid rgba(255,255,255,0.08);padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:500;letter-spacing:-.3px;color:#e8e8e4}
.logo span{color:#1D9E75}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:#888780;background:#252629;padding:4px 10px;border-radius:20px;border:0.5px solid rgba(255,255,255,0.06)}
.sync-dot{width:5px;height:5px;border-radius:50%;background:#1D9E75;flex-shrink:0}
.sync-dot.syncing{background:#BA7517;animation:pulse 1s infinite}
.sync-dot.error{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.profile-bar{background:#1a1b1e;border-bottom:0.5px solid rgba(255,255,255,0.06);padding:8px 16px;display:flex;align-items:center;gap:10px}
.profile-label{font-size:11px;color:#5F5E5A;flex-shrink:0}
.profile-toggle{display:flex;gap:4px}
.profile-btn{padding:5px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;color:#888780;border:0.5px solid rgba(255,255,255,0.1);background:transparent;transition:all .15s;white-space:nowrap}
.profile-btn.active-me{background:#0C447C;color:#85B7EB;border-color:#185FA5}
.profile-btn.active-wife{background:#3C3489;color:#AFA9EC;border-color:#534AB7}
.profile-btn.active-bp{background:#633806;color:#EF9F27;border-color:#854F0B}
.profile-btn.active-rq{background:#27500A;color:#97C459;border-color:#3B6D11}
.profile-btn.active-both{background:#252629;color:#e8e8e4;border-color:rgba(255,255,255,0.15)}

.content{flex:1;padding:14px 16px;padding-bottom:calc(72px + env(safe-area-inset-bottom));max-width:680px;margin:0 auto;width:100%}

.tab-bar{background:#1a1b1e;border-top:0.5px solid rgba(255,255,255,0.08);padding:6px 4px;padding-bottom:calc(6px + env(safe-area-inset-bottom));display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100}
.tab{flex:1;padding:5px 2px;cursor:pointer;font-size:9px;font-weight:500;color:#5F5E5A;border:none;background:none;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0;transition:color .15s}
.tab i{font-size:20px;line-height:1}
.tab.active{color:#1D9E75}
.tab-label{font-size:9px;font-weight:500;white-space:nowrap}

.card{background:#1a1b1e;border:0.5px solid rgba(255,255,255,0.08);border-radius:12px;overflow:hidden;margin-bottom:12px}
.card-header{padding:12px 16px;border-bottom:0.5px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11px;font-weight:500;color:#5F5E5A;letter-spacing:.3px;text-transform:uppercase}
.card-body{padding:14px 16px}

.metric-card{background:#252629;border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:3px}
.metric-label{font-size:11px;color:#888780;font-weight:500;display:flex;align-items:center;gap:4px}
.metric-label i{font-size:14px}
.metric-value{font-size:26px;font-weight:500;letter-spacing:-1px;color:#e8e8e4;line-height:1.1}
.metric-value.pos{color:#1D9E75}.metric-value.neg{color:#E24B4A}.metric-value.warn{color:#BA7517}
.metric-sub{font-size:11px;color:#5F5E5A}

.acct-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.acct-card{background:#1a1b1e;border:0.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px}
.acct-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.acct-name{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:#e8e8e4}
.acct-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-me{background:#378ADD}.dot-wife{background:#7F77DD}.dot-bp{background:#BA7517}.dot-rq{background:#639922}
.acct-pnl{font-size:12px;font-weight:500}
.acct-pnl.pos{color:#1D9E75}.acct-pnl.neg{color:#E24B4A}
.acct-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:0.5px solid rgba(255,255,255,0.06)}
.acct-row-label{font-size:11px;color:#5F5E5A;display:flex;align-items:center;gap:4px}
.acct-row-label i{font-size:13px}
.acct-row-val{font-size:12px;font-weight:500;color:#e8e8e4}

.list-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:0.5px solid rgba(255,255,255,0.05);transition:background .1s}
.list-row:last-child{border-bottom:none}
.list-row-left{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;margin-right:10px}
.list-row-title{font-size:13px;font-weight:500;color:#e8e8e4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-row-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.list-row-right{font-size:13px;font-weight:500;flex-shrink:0}
.list-row-right.pos{color:#1D9E75}.list-row-right.neg{color:#E24B4A}.list-row-right.warn{color:#BA7517}

.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap;border:0.5px solid transparent}
.pill-me{background:#0C447C;color:#85B7EB;border-color:#185FA5}
.pill-wife{background:#3C3489;color:#AFA9EC;border-color:#534AB7}
.pill-bp{background:#633806;color:#EF9F27;border-color:#854F0B}
.pill-rq{background:#27500A;color:#97C459;border-color:#3B6D11}
.pill-qualifier{background:#0C447C;color:#85B7EB}
.pill-freebet{background:#27500A;color:#97C459}
.pill-boost{background:#633806;color:#EF9F27}
.pill-mug{background:#042C53;color:#85B7EB}
.pill-extraplace{background:#3C3489;color:#AFA9EC}
.pill-2up{background:#085041;color:#5DCAA5}
.pill-mbal{background:#72243E;color:#ED93B1}
.pill-cashback{background:#27500A;color:#97C459}
.pill-cashout{background:#791F1F;color:#F09595}
.pill-arb{background:#633806;color:#EF9F27}
.pill-deposit,.pill-withdrawal{background:#252629;color:#888780}
.pill-exchangedeposit,.pill-exchangewithdrawal{background:#085041;color:#5DCAA5}
.pill-balanceamendment{background:#252629;color:#888780}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.badge-active{background:#27500A;color:#97C459}
.badge-restricted{background:#633806;color:#EF9F27}
.badge-gubbed{background:#791F1F;color:#F09595}
.badge-closed{background:#252629;color:#5F5E5A}

/* ── FORM ── */
.form-section{margin-bottom:14px}
.form-label{font-size:10px;font-weight:500;color:#5F5E5A;letter-spacing:.3px;text-transform:uppercase;display:block;margin-bottom:5px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-row.single{grid-template-columns:1fr}
.form-row.triple{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.span2{grid-column:1/-1}
input[type=text],input[type=number],select,textarea{width:100%;background:#252629;border:0.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 11px;font-family:system-ui,-apple-system,sans-serif;font-size:13px;color:#e8e8e4;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:rgba(255,255,255,0.25);background:#2e2f33}
input#f-pnl{border-color:#1D9E75;font-size:15px;font-weight:500;background:#0d1f19}
input#f-pnl:focus{background:#0f2a20}
input#f-date{font-size:12px;padding:7px 10px}
textarea{resize:vertical;min-height:60px}
select option{background:#252629;color:#e8e8e4}

/* ── TYPE GROUPS ── */
.type-groups{display:flex;flex-direction:column;gap:8px}
.type-group-label{font-size:10px;font-weight:500;color:#5F5E5A;letter-spacing:.3px;text-transform:uppercase;margin-bottom:5px}
.type-pills{display:flex;flex-wrap:wrap;gap:5px}
.type-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid rgba(255,255,255,0.1);background:#252629;color:#888780;transition:all .15s}
.type-pill.sel{border-width:1px}
.sel-qualifier{background:#0C447C;color:#85B7EB;border-color:#185FA5}
.sel-freebet{background:#27500A;color:#97C459;border-color:#3B6D11}
.sel-boost{background:#633806;color:#EF9F27;border-color:#854F0B}
.sel-mug{background:#042C53;color:#85B7EB;border-color:#0C447C}
.sel-extraplace{background:#3C3489;color:#AFA9EC;border-color:#534AB7}
.sel-2up{background:#085041;color:#5DCAA5;border-color:#0F6E56}
.sel-mbal{background:#72243E;color:#ED93B1;border-color:#993556}
.sel-cashback{background:#27500A;color:#97C459;border-color:#3B6D11}
.sel-cashout{background:#791F1F;color:#F09595;border-color:#A32D2D}
.sel-arb{background:#633806;color:#EF9F27;border-color:#854F0B}
.sel-deposit,.sel-withdrawal{background:#2e2f33;color:#B4B2A9;border-color:#444441}
.sel-exchangedeposit,.sel-exchangewithdrawal{background:#085041;color:#5DCAA5;border-color:#0F6E56}
.sel-balanceamendment{background:#2e2f33;color:#B4B2A9;border-color:#444441}

.acct-selector{display:flex;gap:5px;flex-wrap:wrap}
.acct-sel-btn{flex:1;min-width:60px;padding:7px 5px;border-radius:8px;border:0.5px solid rgba(255,255,255,0.1);background:#252629;color:#888780;font-family:system-ui,-apple-system,sans-serif;font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s}
.acct-sel-btn.active-me{background:#0C447C;color:#85B7EB;border-color:#185FA5}
.acct-sel-btn.active-wife{background:#3C3489;color:#AFA9EC;border-color:#534AB7}
.acct-sel-btn.active-bp{background:#633806;color:#EF9F27;border-color:#854F0B}
.acct-sel-btn.active-rq{background:#27500A;color:#97C459;border-color:#3B6D11}

.btn{padding:11px 20px;border-radius:8px;font-family:system-ui,-apple-system,sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:0.5px solid rgba(255,255,255,0.12);background:#252629;color:#e8e8e4;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(0.98)}
.btn-primary{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn-primary:hover{background:#0F6E56;border-color:#0F6E56}
.btn-full{width:100%;padding:13px}
.btn-danger{background:#791F1F;color:#F09595;border-color:#A32D2D}
.btn-ghost{background:#252629;color:#888780;border-color:rgba(255,255,255,0.08)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px;font-family:system-ui,-apple-system,sans-serif;font-weight:500;cursor:pointer;border:0.5px solid rgba(255,255,255,0.1);background:#252629;color:#888780;transition:all .15s}
.btn-sm-edit{background:#633806;color:#EF9F27;border-color:#854F0B}
.btn-sm-dupe{background:#0C447C;color:#85B7EB;border-color:#185FA5}
.btn-sm-danger{background:#791F1F;color:#F09595;border-color:#A32D2D}
.btn-won{background:#27500A;color:#97C459;border:0.5px solid #3B6D11;padding:9px 16px;border-radius:8px;font-family:system-ui,-apple-system,sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;flex:1}
.btn-lost{background:#791F1F;color:#F09595;border:0.5px solid #A32D2D;padding:9px 16px;border-radius:8px;font-family:system-ui,-apple-system,sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;flex:1}

.table-wrap{overflow:auto;border-radius:12px;border:0.5px solid rgba(255,255,255,0.08);margin-bottom:12px;background:#1a1b1e;-webkit-overflow-scrolling:touch}
.data-table{width:100%;border-collapse:collapse;min-width:460px}
.data-table th{padding:8px 12px;text-align:left;font-size:10px;font-weight:500;letter-spacing:.3px;text-transform:uppercase;color:#5F5E5A;border-bottom:0.5px solid rgba(255,255,255,0.06);background:#252629;white-space:nowrap;position:sticky;top:0}
.data-table td{padding:9px 12px;font-size:12px;border-bottom:0.5px solid rgba(255,255,255,0.04);vertical-align:middle;color:#e8e8e4}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#1f2024}
.pos{color:#1D9E75;font-weight:500}.neg{color:#E24B4A;font-weight:500}.muted{color:#5F5E5A}

.pending-card{background:#1a1b1e;border:0.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;margin-bottom:10px}
.pending-event{font-size:14px;font-weight:500;color:#e8e8e4;margin-bottom:6px}
.pending-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.pending-info{background:#252629;border-radius:8px;padding:10px 12px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.pinfo-item{display:flex;flex-direction:column;gap:2px}
.pinfo-label{font-size:10px;color:#5F5E5A;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.pinfo-val{font-size:13px;font-weight:500;color:#e8e8e4}
.pinfo-val.pos{color:#1D9E75}.pinfo-val.neg{color:#E24B4A}

.month-wrap{display:flex;align-items:flex-end;gap:6px;overflow-x:auto;padding:4px 2px}
.month-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:0 0 auto;min-width:40px}
.month-bar{width:32px;border-radius:3px 3px 0 0;min-height:2px}
.month-bar.pos{background:#1D9E75}.month-bar.neg{background:#E24B4A;border-radius:0 0 3px 3px}
.month-lbl{font-size:9px;color:#5F5E5A;font-weight:500}
.month-val{font-size:9px;font-weight:500}
.month-val.pos{color:#1D9E75}.month-val.neg{color:#E24B4A}

.flow-preview{background:#085041;border:0.5px solid#0F6E56;border-radius:8px;padding:9px 12px;font-size:12px;color:#5DCAA5;display:flex;align-items:center;gap:8px;margin-bottom:10px}

.dest-selector{display:flex;gap:5px;flex-wrap:wrap}
.dest-btn{flex:1;min-width:55px;padding:6px 5px;border-radius:8px;border:0.5px solid rgba(255,255,255,0.1);background:#252629;color:#888780;font-family:system-ui,-apple-system,sans-serif;font-size:11px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s}
.dest-btn.active{background:#085041;color:#5DCAA5;border-color:#0F6E56}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.modal-bg{align-items:center}}
.modal{background:#1a1b1e;border-radius:16px 16px 0 0;border:0.5px solid rgba(255,255,255,0.1);padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));width:100%;max-width:500px}
@media(min-width:600px){.modal{border-radius:14px;padding:24px}}
.modal-handle{width:32px;height:3px;background:rgba(255,255,255,0.12);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:500;margin-bottom:4px;color:#e8e8e4}
.modal-sub{font-size:12px;color:#5F5E5A;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;margin-top:16px}

.toast{position:fixed;bottom:calc(68px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(16px);background:#e8e8e4;border-radius:20px;padding:10px 18px;font-size:12px;font-weight:500;color:#1a1b1e;z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:12px;color:#5F5E5A;font-size:13px}
.spinner{width:28px;height:28px;border:2px solid rgba(255,255,255,0.08);border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:30px 20px;text-align:center;color:#5F5E5A;font-size:13px}
.search-input{width:100%;background:#252629;border:none;border-bottom:0.5px solid rgba(255,255,255,0.06);padding:10px 16px;font-family:system-ui,-apple-system,sans-serif;font-size:14px;color:#e8e8e4;outline:none}
.search-input::placeholder{color:#444441}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.filter-select{background:#1a1b1e;border:0.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 10px;font-family:system-ui,-apple-system,sans-serif;font-size:12px;color:#e8e8e4;outline:none;-webkit-appearance:none}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">MB<span>Empire</span></div>
    <div class="sync-badge"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Loading</span></div>
  </div>
  <div class="profile-bar" id="profile-bar" style="display:none">
    <span class="profile-label">Viewing</span>
    <div class="profile-toggle">
      <button class="profile-btn active-me" id="pbtn-me" onclick="switchProfile('me')">JG</button>
      <button class="profile-btn" id="pbtn-wife" onclick="switchProfile('wife')">HG</button>
      <button class="profile-btn" id="pbtn-bp" onclick="switchProfile('bp')">BP</button>
      <button class="profile-btn" id="pbtn-rq" onclick="switchProfile('rq')">RQ</button>
      <button class="profile-btn" id="pbtn-both" onclick="switchProfile('both')">All</button>
    </div>
  </div>
  <div class="content" id="main-content">
    <div class="loading"><div class="spinner"></div>Loading…</div>
  </div>
  <div class="tab-bar">
    <button class="tab active" id="tab-dashboard" onclick="switchTab('dashboard')"><i class="ti ti-layout-dashboard" aria-hidden="true"></i><span class="tab-label">Dashboard</span></button>
    <button class="tab" id="tab-pending" onclick="switchTab('pending')"><i class="ti ti-clock" aria-hidden="true"></i><span class="tab-label">Settle <span id="pending-badge" style="display:none;background:#BA7517;color:#fff;border-radius:10px;padding:0 5px;font-size:9px;font-weight:500">0</span></span></button>
    <button class="tab" id="tab-add" onclick="switchTab('add')"><i class="ti ti-plus" aria-hidden="true"></i><span class="tab-label">Log trade</span></button>
    <button class="tab" id="tab-history" onclick="switchTab('history')"><i class="ti ti-list" aria-hidden="true"></i><span class="tab-label">History</span></button>
    <button class="tab" id="tab-accounts" onclick="switchTab('accounts')"><i class="ti ti-building-bank" aria-hidden="true"></i><span class="tab-label">Accounts</span></button>
    <button class="tab" id="tab-reports" onclick="switchTab('reports')"><i class="ti ti-chart-bar" aria-hidden="true"></i><span class="tab-label">Reports</span></button>
  </div>
</div>
<div class="toast" id="toast"></div>
<div id="modal-root"></div>

<script>
const SUPABASE_URL_UNUSED='';
let syncTimeout=null;

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot'),label=document.getElementById('sync-label');
  if(!dot||!label)return;
  dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  label.textContent=s==='syncing'?'Saving':s==='error'?'Offline':'Saved';
}

async function loadData(){
  try{
    const res=await fetch('/api/load');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    if(json.ok&&json.data){
      const saved=json.data;
      const hasData=PROFILES.some(p=>saved[p]&&((saved[p].transactions||[]).length>0||saved[p].bank!==0||Object.values(saved[p].bookies||{}).some(b=>(b.bal||0)!==0)));
      if(hasData){Object.assign(state,saved);try{localStorage.setItem('mbe_cache',JSON.stringify(saved));}catch(e){}}
    }
    setSyncStatus('synced');
  }catch(e){
    console.error('Load error:',e);
    try{const c=localStorage.getItem('mbe_cache');if(c){const s=JSON.parse(c);if(PROFILES.some(p=>s[p]&&((s[p].transactions||[]).length>0||s[p].bank!==0)))Object.assign(state,s);}}catch(le){}
    setSyncStatus('error');
  }
}

async function saveData(){
  setSyncStatus('syncing');
  try{
    const res=await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)});
    if(!res.ok)throw new Error('HTTP '+res.status);
    setSyncStatus('synced');
    try{localStorage.setItem('mbe_cache',JSON.stringify(state));}catch(e){}
  }catch(e){
    console.error('Save error:',e);
    setSyncStatus('error');
    try{localStorage.setItem('mbe_cache',JSON.stringify(state));}catch(le){}
  }
}

function debouncedSave(){if(syncTimeout)clearTimeout(syncTimeout);setSyncStatus('syncing');syncTimeout=setTimeout(saveData,1000);}
function save(){debouncedSave();}

function makeProfile(){const b={};DEFAULT_BOOKIES.forEach(x=>b[x]={bal:0,status:'Active',notes:''});return{bookies:b,bank:0,transactions:[]};}
function freshState(){const ex={};EXCHANGES.forEach(x=>ex[x]=0);const st={exchanges:ex};PROFILES.forEach(pr=>st[pr]=makeProfile());return st;}
const state=freshState();

function migrateLegacy(){
  PROFILES.forEach(pr=>{
    if(!state[pr])state[pr]=makeProfile();
    if(!state[pr].transactions)state[pr].transactions=[];
    const bk=state[pr].bookies||{};
    DEFAULT_BOOKIES.forEach(b=>{if(!bk[b])bk[b]={bal:0,status:'Active',notes:''};});
    Object.keys(bk).forEach(k=>{
      if(typeof bk[k]==='number')bk[k]={bal:bk[k],status:'Active',notes:''};
      if(!bk[k].status)bk[k].status='Active';
      if(bk[k].notes===undefined)bk[k].notes='';
    });
    state[pr].bookies=bk;
  });
  if(!state.exchanges){state.exchanges={};EXCHANGES.forEach(e=>state.exchanges[e]=0);}
  EXCHANGES.forEach(e=>{if(state.exchanges[e]===undefined)state.exchanges[e]=0;});
}

function monthlyPnl(txs){
  const map={};
  txs.forEach(t=>{if(!t.date||!t.pnl||t.type==='Balance Amendment')return;const pts=t.date.split('/');if(pts.length<3)return;const k=`${pts[2]}-${pts[1]}`;map[k]=(map[k]||0)+(t.pnl||0);});
  return map;
}

function renderMonthBars(map,height=90){
  const keys=Object.keys(map).sort();if(!keys.length)return`<div class="empty">No data yet</div>`;
  const vals=keys.map(k=>map[k]);const maxAbs=Math.max(...vals.map(Math.abs),0.01);
  return`<div class="month-wrap" style="height:${height}px;align-items:flex-end">
    ${keys.map(k=>{const v=map[k];const pct=Math.abs(v)/maxAbs*82;const col=v>=0?'pos':'neg';const[yr,mo]=k.split('-');const lbl=new Date(+yr,+mo-1).toLocaleString('default',{month:'short'});
      return`<div class="month-col"><div class="month-val ${col}">${fmtS(v)}</div><div class="month-bar ${col}" style="height:${pct}%"></div><div class="month-lbl">${lbl}</div></div>`;
    }).join('')}
  </div>`;
}

function applyBalanceOnSettle(tx,p,result){
  const isFB=isFreeBet(tx.type);
  const bstake=tx.bstake||0,bodds=tx.bodds||0,pnl=tx.pnl||0,exchange=tx.exchange;
  if(result==='Won'){
    if(isFB){if(tx.bookie&&p.bookies[tx.bookie])p.bookies[tx.bookie].bal=(p.bookies[tx.bookie].bal||0)+(bodds*bstake);}
    else{if(tx.bookie&&p.bookies[tx.bookie])p.bookies[tx.bookie].bal=(p.bookies[tx.bookie].bal||0)+bstake+pnl;}
  }else if(result==='Lost'){
    if(exchange&&state.exchanges[exchange]!==undefined)state.exchanges[exchange]=(state.exchanges[exchange]||0)+pnl;
  }
}

function applyBalanceAtLog(tx,p){
  if(tx.result==='Pending'){
    if(!isFreeBet(tx.type)&&tx.bookie&&p.bookies[tx.bookie])p.bookies[tx.bookie].bal=(p.bookies[tx.bookie].bal||0)-(tx.bstake||0);
  }else{applyBalanceOnSettle(tx,p,tx.result);}
}

function settleBet(acct,id,result){
  const p=state[acct];const tx=(p.transactions||[]).find(t=>t.id===id);if(!tx||tx.result!=='Pending')return;
  tx.result=result;applyBalanceOnSettle(tx,p,result);save();
  const card=document.getElementById('pcard-'+id);
  if(card){card.style.transition='opacity .25s,transform .25s';card.style.opacity='0';card.style.transform='translateY(-6px)';setTimeout(()=>{card.remove();updateBadge();},260);}
  showToast(`${result==='Won'?'Won':'Lost'} — ${fmtS(tx.pnl||0)}`,result==='Won'?'success':'error');
  setTimeout(render,300);
}

function confirmPnlEdit(acct,id){
  const newPnl=parseFloat(document.getElementById('modal-pnl')?.value);if(isNaN(newPnl))return;
  const p=state[acct];const tx=p.transactions.find(t=>t.id===id);if(!tx)return;
  const diff=newPnl-(tx.pnl||0);tx.pnl=newPnl;
  if(tx.result==='Won'&&tx.bookie&&p.bookies[tx.bookie])p.bookies[tx.bookie].bal=(p.bookies[tx.bookie].bal||0)+diff;
  else if(tx.result==='Lost'&&tx.exchange&&state.exchanges[tx.exchange]!==undefined)state.exchanges[tx.exchange]=(state.exchanges[tx.exchange]||0)+diff;
  save();closeModal();showToast(`P&L updated to ${fmtS(newPnl)}`);render();
}

function setFormAccount(a){
  formAccount=a;
  PROFILES.forEach(pr=>{const b=document.getElementById('facc-'+pr);if(b)b.className='acct-sel-btn'+(a===pr?' active-'+pr:'');});
  const dot=document.getElementById('form-dot');if(dot)dot.style.background=profileColor(a);
  const bs=document.getElementById('f-bookie');
  if(bs){const prev=bs.value;bs.innerHTML='<option value="">— select —</option>'+Object.keys(state[a].bookies||{}).map(b=>`<option${b===prev?' selected':''}>${b}</option>`).join('');}
}
function setExchBank(b){exchTransferBank=b;PROFILES.forEach(pr=>{const el=document.getElementById('ebank-'+pr);if(el)el.className='dest-btn'+(b===pr?' active':'');});updateFlowPreview();}
function selectBetType(t){
  selectedBetType=t;
  document.querySelectorAll('.type-pill').forEach(el=>{el.className='type-pill';if(el.dataset.type===t)el.classList.add('sel','sel-'+t.toLowerCase().replace(/\s/g,''));});
  updateFormFields();
}
function updateFormFields(){
  const isBookieT=BOOKIE_TRANSFER.includes(selectedBetType),isExchT=EXCHANGE_TRANSFER.includes(selectedBetType),isBet=BET_ONLY.includes(selectedBetType),isAmend=selectedBetType==='Balance Amendment';
  // Show/hide individual groups
  sh('fg-bookie',isBet||isBookieT);sh('fg-exchange',isBet||isExchT);
  sh('fg-exchbank',isExchT);sh('fg-event',isBet);
  sh('fg-stake-odds',isBet);sh('fg-bstake',isBet);sh('fg-bodds',isBet);sh('fg-comm',isBet);
  sh('fg-result',isBet);sh('fg-pnl',isBet);
  sh('fg-amount',isBookieT||isExchT);
  sh('fg-amend-target',isAmend);sh('fg-amend-bal',isAmend);
  sh('fg-amend-current',isAmend);sh('fg-amend-new',isAmend);sh('fg-amend-reason',isAmend);
  sh('fg-notes',!isAmend);
  const fp=document.getElementById('flow-preview');if(fp)fp.style.display=isExchT?'flex':'none';
  if(isExchT)updateFlowPreview();
}
function sh(id,v){const el=document.getElementById(id);if(el)el.style.display=v?(el.classList.contains('form-row')||el.classList.contains('form-group')?'flex':'flex'):'none';}
function updateAmendCurrent(){
  const target=document.getElementById('f-amend-target')?.value,ac=document.getElementById('f-amend-current');if(!ac)return;
  const p=state[formAccount];
  if(target==='bank')ac.value=p.bank.toFixed(2);
  else if(target?.startsWith('bookie:'))ac.value=((p.bookies||{})[target.slice(7)]?.bal||0).toFixed(2);
  else ac.value='';
}
function updateFlowPreview(){
  const ft=document.getElementById('flow-text'),fp=document.getElementById('flow-preview');if(!ft||!fp)return;
  const isExchDep=selectedBetType==='Exchange Deposit',amt=parseFloat(document.getElementById('f-amount')?.value)||0,exch=document.getElementById('f-exchange')?.value||'exchange',bankLabel=`${profileLabel(exchTransferBank)}'s bank`;
  ft.textContent=isExchDep?(amt?`${bankLabel} −£${amt.toFixed(2)} → ${exch} +£${amt.toFixed(2)}`:`${bankLabel} → ${exch}`):(amt?`${exch} −£${amt.toFixed(2)} → ${bankLabel} +£${amt.toFixed(2)}`:`${exch} → ${bankLabel}`);
}
function bindFormEvents(){const exchSel=document.getElementById('f-exchange');if(exchSel)exchSel.addEventListener('change',updateFlowPreview);}
function resetForm(){
  selectedBetType='';exchTransferBank='me';
  document.querySelectorAll('.type-pill').forEach(el=>el.className='type-pill');
  ['f-bookie','f-exchange','f-event','f-bstake','f-bodds','f-amount','f-notes','f-pnl','f-amend-target','f-amend-current','f-amend-new','f-amend-reason'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const fc=document.getElementById('f-comm');if(fc)fc.value='0';
  const fr=document.getElementById('f-result');if(fr)fr.value='Pending';
  const fp=document.getElementById('flow-preview');if(fp)fp.style.display='none';
  updateFormFields();
}

function submitTx(){
  const msg=document.getElementById('form-msg');
  if(!selectedBetType){msg.textContent='Please select a transaction type.';return;}
  const isBookieT=BOOKIE_TRANSFER.includes(selectedBetType),isExchT=EXCHANGE_TRANSFER.includes(selectedBetType),isBet=BET_ONLY.includes(selectedBetType),isAmend=selectedBetType==='Balance Amendment';
  const date=document.getElementById('f-date').value||todayStr(),notes=document.getElementById('f-notes')?.value||'';
  if(isAmend){
    const target=document.getElementById('f-amend-target')?.value,newValStr=document.getElementById('f-amend-new')?.value,reason=document.getElementById('f-amend-reason')?.value||'Balance Amendment';
    if(!target){msg.textContent='Select what to amend.';return;}
    if(!newValStr){msg.textContent='Enter a new balance.';return;}
    const newVal=parseFloat(newValStr);if(isNaN(newVal))return;
    const p=state[formAccount];let oldVal,targetLabel;
    if(target==='bank'){oldVal=p.bank;p.bank=newVal;targetLabel='Bank';}
    else{const name=target.slice(7);oldVal=(p.bookies||{})[name]?.bal||0;p.bookies[name].bal=newVal;targetLabel=name;}
    const diff=newVal-oldVal;if(!p.transactions)p.transactions=[];
    p.transactions.push({id:Date.now(),date,type:'Balance Amendment',target:targetLabel,oldVal,newVal,diff,pnl:diff,notes:reason,result:'—',_acct:formAccount});
    save();showToast(`${targetLabel} → ${fmt(newVal)}`);msg.textContent='';resetForm();setTimeout(render,100);return;
  }
  const bookie=document.getElementById('f-bookie')?.value,exchange=document.getElementById('f-exchange')?.value,event=document.getElementById('f-event')?.value||'';
  const bstake=parseFloat(document.getElementById('f-bstake')?.value)||0,bodds=parseFloat(document.getElementById('f-bodds')?.value)||0,comm=parseFloat(document.getElementById('f-comm')?.value)||0;
  const result=document.getElementById('f-result')?.value||'Pending',pnl=parseFloat(document.getElementById('f-pnl')?.value)||0,amount=parseFloat(document.getElementById('f-amount')?.value)||0;
  if(isBookieT){
    if(!bookie){msg.textContent='Select a bookmaker.';return;}
    if(!amount){msg.textContent='Enter an amount.';return;}
    const p=state[formAccount];
    if(!p.bookies[bookie])p.bookies[bookie]={bal:0,status:'Active',notes:''};
    if(selectedBetType==='Deposit'){p.bookies[bookie].bal=(p.bookies[bookie].bal||0)+amount;p.bank-=amount;}
    else{p.bookies[bookie].bal=(p.bookies[bookie].bal||0)-amount;p.bank+=amount;}
    if(!p.transactions)p.transactions=[];
    p.transactions.push({id:Date.now(),date,type:selectedBetType,bookie,amount,pnl:0,notes,result:'—',_acct:formAccount});
  }else if(isExchT){
    if(!exchange){msg.textContent='Select an exchange.';return;}
    if(!amount){msg.textContent='Enter an amount.';return;}
    const ba=state[exchTransferBank];
    if(selectedBetType==='Exchange Deposit'){state.exchanges[exchange]=(state.exchanges[exchange]||0)+amount;ba.bank-=amount;}
    else{state.exchanges[exchange]=(state.exchanges[exchange]||0)-amount;ba.bank+=amount;}
    if(!ba.transactions)ba.transactions=[];
    ba.transactions.push({id:Date.now(),date,type:selectedBetType,exchange,amount,pnl:0,notes,result:'—',_acct:exchTransferBank});
  }else if(isBet){
    if(!bookie){msg.textContent='Select a bookmaker.';return;}
    if(!bstake||!bodds){msg.textContent='Enter back stake and odds.';return;}
    const p=state[formAccount];
    if(!p.bookies[bookie])p.bookies[bookie]={bal:0,status:'Active',notes:''};
    if(!p.transactions)p.transactions=[];
    const tx={id:Date.now(),date,type:selectedBetType,bookie,exchange,event,bstake,bodds,comm,result,pnl,notes,_acct:formAccount};
    p.transactions.push(tx);applyBalanceAtLog(tx,p);
  }
  save();showToast('Saved!');msg.textContent='';resetForm();setTimeout(render,100);
}

function duplicateTrade(acct,id){
  const tx=(state[acct].transactions||[]).find(t=>t.id===id);if(!tx)return;
  formAccount=acct;selectedBetType=tx.type||'';
  currentTab='add';document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-add')?.classList.add('active');
  document.getElementById('profile-bar').style.display='none';
  document.getElementById('main-content').innerHTML=renderAdd(tx);
  updateBadge();bindFormEvents();updateFormFields();
  document.querySelectorAll('.type-pill').forEach(el=>{el.className='type-pill';if(el.dataset.type===tx.type)el.classList.add('sel','sel-'+tx.type.toLowerCase().replace(/\s/g,''));});
  const fb=document.getElementById('f-bookie');if(fb&&tx.bookie)fb.value=tx.bookie;
  const fe=document.getElementById('f-exchange');if(fe&&tx.exchange)fe.value=tx.exchange;
  showToast('Duplicated — edit and save');window.scrollTo(0,0);
}

function deleteTx(acct,id){if(!confirm('Delete? Balances will not be reversed.'))return;state[acct].transactions=state[acct].transactions.filter(t=>t.id!==id);save();render();}

function exportCSV(){
  const txs=allTxs();
  const headers=['Date','Account','Type','Bookmaker','Exchange','Event','Back Stake','Back Odds','Commission %','Result','P&L','Notes'];
  const rows=txs.map(t=>[t.date||'',profileLabel(t._acct),t.type||'',t.bookie||'',t.exchange||'',t.event||t.notes||'',t.bstake||'',t.bodds||'',t.comm!==undefined?t.comm:'',t.result||'',t.pnl!==undefined?t.pnl.toFixed(2):'',t.notes||'']);
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'}),url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=`mbempire_${todayStr().replace(/\//g,'-')}.csv`;a.click();URL.revokeObjectURL(url);showToast('CSV exported!');
}

      <div class="modal-sub">${profileLabel(acct)}'s account</div>
      <div style="margin-bottom:12px"><div class="form-label">Balance (£)</div><input type="number" id="modal-bal" step="0.01" value="${(bk.bal||0).toFixed(2)}" inputmode="decimal" style="font-size:18px;font-weight:500"/></div>
      <div style="margin-bottom:12px"><div class="form-label">Status</div><select id="modal-status">${BOOKIE_STATUSES.map(s=>`<option${bk.status===s?' selected':''}>${s}</option>`).join('')}</select></div>
      <div style="margin-bottom:12px"><div class="form-label">Notes</div><textarea id="modal-notes" placeholder="e.g. Max stake £5, email verified…">${bk.notes||''}</textarea></div>
      <div style="margin-bottom:4px"><div class="form-label">Reason for balance change</div><input type="text" id="modal-reason" placeholder="e.g. Casino offer, correction…"/></div>
      <div class="modal-actions">
        <button class="btn btn-primary" style="flex:1" onclick="confirmBookieEdit('${acct}','${name}')">Save</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>`;}

function confirmBookieEdit(acct,name){
  const newBal=parseFloat(document.getElementById('modal-bal')?.value),newStatus=document.getElementById('modal-status')?.value||'Active',newNotes=document.getElementById('modal-notes')?.value||'',reason=document.getElementById('modal-reason')?.value||'Manual edit';
  const bk=state[acct].bookies[name],oldBal=bk.bal||0;bk.status=newStatus;bk.notes=newNotes;
  if(!isNaN(newBal)&&newBal!==oldBal){const diff=newBal-oldBal;bk.bal=newBal;if(!state[acct].transactions)state[acct].transactions=[];state[acct].transactions.push({id:Date.now(),date:todayStr(),type:'Balance Amendment',target:name,oldVal:oldBal,newVal:newBal,diff,pnl:diff,notes:reason,result:'—',_acct:acct});}
  save();closeModal();showToast(`${name} updated`);render();
}

function showAmendModal(type,acct,name){
  const label=type==='bank'?`${profileLabel(acct)}'s bank`:name,cur=type==='bank'?state[acct].bank:(state[acct].bookies[name]?.bal||0);
  document.getElementById('modal-root').innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Edit balance</div>
      <div class="modal-sub">${label} · Current: ${fmt(cur)}</div>
      <div style="margin-bottom:12px"><div class="form-label">New balance (£)</div><input type="number" id="modal-val" step="0.01" value="${cur.toFixed(2)}" inputmode="decimal" style="font-size:20px;font-weight:500"/></div>
      <div style="margin-bottom:4px"><div class="form-label">Reason (logged)</div><input type="text" id="modal-reason" placeholder="e.g. Casino offer, correction…"/></div>
      <div class="modal-actions">
        <button class="btn btn-primary" style="flex:1" onclick="confirmAmend('${type}','${acct}','${name||''}')">Save</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById('modal-val')?.focus(),100);
}

function confirmAmend(type,acct,name){
  const newVal=parseFloat(document.getElementById('modal-val')?.value),reason=document.getElementById('modal-reason')?.value||'Manual amendment';if(isNaN(newVal))return;
  const p=state[acct];let oldVal,targetLabel;
  if(type==='bank'){oldVal=p.bank;p.bank=newVal;targetLabel='Bank';}else{oldVal=p.bookies[name]?.bal||0;p.bookies[name].bal=newVal;targetLabel=name;}
  const diff=newVal-oldVal;if(!p.transactions)p.transactions=[];
  p.transactions.push({id:Date.now(),date:todayStr(),type:'Balance Amendment',target:targetLabel,oldVal,newVal,diff,pnl:diff,notes:reason,result:'—',_acct:acct});
  save();closeModal();showToast(`${targetLabel} → ${fmt(newVal)}`);render();
}

function adjustExch(name){const cur=state.exchanges[name],val=prompt(`Set balance for ${name}:`,cur.toFixed(2));if(val===null)return;const n=parseFloat(val);if(isNaN(n))return;state.exchanges[name]=n;save();render();}
function addBookie(acct){
  const inp=document.getElementById('new-bookie-name'),name=inp?.value?.trim();if(!name)return;
  if(!state[acct].bookies)state[acct].bookies={};
  if(state[acct].bookies[name]){showToast('Already exists','error');return;}
  state[acct].bookies[name]={bal:0,status:'Active',notes:''};save();inp.value='';render();
}

async function init(){
  await loadData();
  migrateLegacy();
  const pb=document.getElementById('profile-bar');if(pb)pb.style.display='none';
  switchProfile('me');
  render();
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
init();
</script>
</body>
</html>
