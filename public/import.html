<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MBEmpire — Import</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0f11;--bg2:#16181c;--bg3:#1e2026;--bg4:#252830;
  --border:#2e3038;--border2:#3a3d48;
  --text:#e8eaf0;--text2:#9ea3b0;--text3:#5a5f6e;
  --green:#22c97a;--green-dim:#1a3d2b;
  --red:#f05252;--red-dim:#3d1a1a;
  --amber:#f5a623;--amber-dim:#3d2a0a;
  --blue:#4f9cf9;--blue-dim:#0f2040;
  --purple:#a78bfa;--purple-dim:#2d1f4e;
  --orange:#fb923c;--orange-dim:#3d1f0a;
  --lime:#a3e635;--lime-dim:#1e2d0a;
  --sky:#38bdf8;--sky-dim:#0c2a3d;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;font-size:14px;padding:0}
.mono{font-family:'DM Mono',monospace}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:18px;font-weight:800;letter-spacing:-.5px}
.logo span{color:var(--green)}
.back{font-size:12px;color:var(--text3);text-decoration:none;display:flex;align-items:center;gap:5px}
.back:hover{color:var(--text)}
.content{max-width:860px;margin:0 auto;padding:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--green);color:#000;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-num.done{background:var(--bg4);color:var(--text3)}
label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:6px}
textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-family:'DM Mono',monospace;font-size:11px;width:100%;outline:none;resize:vertical;min-height:140px;line-height:1.6}
textarea:focus{border-color:var(--border2)}
.btn{padding:10px 20px;border-radius:9px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--green);color:#000}.btn-primary:hover{background:#1db86d}
.btn-ghost{background:var(--bg3);color:var(--text2)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:7px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;border:none}
.progress{display:flex;gap:6px;margin-bottom:20px}
.prog-step{flex:1;height:3px;border-radius:3px;background:var(--border)}
.prog-step.done{background:var(--green)}.prog-step.active{background:var(--amber)}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.pill-me{background:var(--blue-dim);color:var(--blue)}.pill-wife{background:var(--purple-dim);color:var(--purple)}
.pill-bp{background:var(--orange-dim);color:var(--orange)}.pill-rq{background:var(--lime-dim);color:var(--lime)}
.pill-boost{background:var(--amber-dim);color:var(--amber)}.pill-qualifier{background:var(--blue-dim);color:var(--blue)}
.pill-freebet{background:var(--green-dim);color:var(--green)}.pill-mug{background:var(--sky-dim);color:var(--sky)}
.preview-wrap{overflow:auto;max-height:340px;border-radius:10px;border:1px solid var(--border)}
.preview-table{width:100%;border-collapse:collapse;min-width:560px}
.preview-table th{padding:7px 10px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);background:var(--bg3);white-space:nowrap;position:sticky;top:0;z-index:1}
.preview-table td{padding:7px 10px;font-size:11px;border-bottom:1px solid var(--border);vertical-align:middle;font-family:'DM Mono',monospace}
.preview-table tr:last-child td{border-bottom:none}
.preview-table tr:hover td{background:var(--bg3)}
.pos{color:var(--green);font-weight:700}.neg{color:var(--red);font-weight:700}.neu{color:var(--text3)}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px}
.result-card{background:var(--bg3);border-radius:10px;padding:12px;text-align:center}
.result-card .num{font-size:22px;font-weight:800;color:var(--green)}
.result-card .lbl{font-size:10px;color:var(--text3);margin-top:3px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.success-box{background:var(--green-dim);border:1px solid var(--green);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--green);margin-bottom:14px;font-weight:700}
.error-box{background:var(--red-dim);border:1px solid var(--red);border-radius:10px;padding:12px 16px;font-size:12px;color:var(--red);margin-bottom:14px}
.info-box{background:var(--amber-dim);border:1px solid var(--amber);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--amber);margin-bottom:14px}
.sync-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3);margin-top:10px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">MB<span>Empire</span> <span style="font-size:12px;color:var(--text3);font-weight:400">— Bet Importer</span></div>
  <a href="/" class="back">← Back to app</a>
</div>
<div class="content">
  <div class="progress" id="progress">
    <div class="prog-step active" id="ps1"></div>
    <div class="prog-step" id="ps2"></div>
    <div class="prog-step" id="ps3"></div>
  </div>
  <div id="app"></div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const PROFILES=['me','wife','bp','rq'];
const PROFILE_LABELS={me:'JG',wife:'HG',bp:'BP',rq:'RQ'};

// Column → profile mapping
const ACCT_COLS={
  me:{bet:'John Bet',ret:'John Return'},
  wife:{bet:'Harriet Bet',ret:'Harriet Return'},
  rq:{bet:'Rhen Bet',ret:'Rhen Return'},
  bp:{bet:'Ben Bet',ret:'Ben Return'},
};

// Type mapping from sheet values → EdgeTrack types
const TYPE_MAP={
  'boost':'Boost','Boost':'Boost',
  'qualifier':'Qualifier','Qualifier':'Qualifier',
  'free bet':'Free Bet','Free Bet':'Free Bet','freebet':'Free Bet',
  'mug':'Mug','Mug':'Mug',
  'extra place':'Extra Place','Extra Place':'Extra Place',
  '2up':'2Up','2Up':'2Up',
  'mbal':'MBAL','MBAL':'MBAL',
  'cash back':'Cash Back','Cash Back':'Cash Back',
  'cash out':'Cash Out','Cash Out':'Cash Out',
  'arb':'Arb','Arb':'Arb',
};

// Result mapping
function mapResult(v){
  const s=(v||'').toLowerCase().trim();
  if(['win','won','w'].includes(s))return'Won';
  if(['lose','lost','loss','l'].includes(s))return'Lost';
  return'Lost'; // default settled bets to Lost for safety
}

function mapType(v){
  return TYPE_MAP[(v||'').trim()]||TYPE_MAP[(v||'').trim().toLowerCase()]||'Qualifier';
}

function parseNum(v){
  if(!v||v==='')return 0;
  return parseFloat(String(v).replace(/[£,\s]/g,''))||0;
}

function parseDate(v){
  if(!v)return todayStr();
  const s=String(v).trim();
  // "6-May" or "06-May" or "6 May"
  const m1=s.match(/^(\d{1,2})[-\s]([A-Za-z]{3,})(?:[-\s](\d{2,4}))?$/);
  if(m1){
    const months={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
    const mo=months[m1[2].toLowerCase().slice(0,3)];
    if(mo){const yr=m1[3]?(m1[3].length===2?'20'+m1[3]:m1[3]):new Date().getFullYear();return`${m1[1].padStart(2,'0')}/${mo}/${yr}`;}
  }
  // DD/MM/YYYY or DD-MM-YYYY
  const m2=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m2){const yr=m2[3].length===2?'20'+m2[3]:m2[3];return`${m2[1].padStart(2,'0')}/${m2[2].padStart(2,'0')}/${yr}`;}
  return s;
}

function todayStr(){const d=new Date();return[String(d.getDate()).padStart(2,'0'),String(d.getMonth()+1).padStart(2,'0'),d.getFullYear()].join('/');}
function fmtS(v){const n=parseFloat(v)||0;return(n>=0?'+':'-')+'£'+Math.abs(n).toFixed(2);}
function pillClass(t){return'pill pill-'+(t||'').toLowerCase().replace(/[\s]/g,'');}
function acctPill(a){return`<span class="pill pill-${a}">${PROFILE_LABELS[a]||a}</span>`;}

// ── STATE ─────────────────────────────────────────────────────────────────────
let step=1;
let rawText='';
let preview=[];
let importResult=null;

// ── PROGRESS ──────────────────────────────────────────────────────────────────
function updateProgress(){
  for(let i=1;i<=3;i++){
    const el=document.getElementById('ps'+i);if(!el)return;
    el.className='prog-step'+(i<step?' done':i===step?' active':'');
  }
}
function render(){
  updateProgress();
  const app=document.getElementById('app');
  if(step===1)app.innerHTML=renderStep1();
  else if(step===2)app.innerHTML=renderStep2();
  else if(step===3)app.innerHTML=renderStep3();
}

// ── STEP 1: Paste ─────────────────────────────────────────────────────────────
function renderStep1(){
  return`
  <div class="card">
    <div class="card-title"><span class="step-num">1</span>Export & paste your Google Sheet data</div>
    <div class="info-box" style="margin-bottom:14px">
      In Google Sheets: <strong>File → Download → CSV</strong> — then open the CSV in Notepad, select all and paste below.<br>
      Or you can copy directly from the sheet (select all cells including headers, then Ctrl+C).
    </div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.7">
      Expected columns: <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text)">Date, Bookmaker, Exchange, Type, Result, What, P&L, John Bet, John Return, Harriet Bet, Harriet Return, Rhen Bet, Rhen Return, Ben Bet, Ben Return</span>
    </p>
    <div style="margin-bottom:14px">
      <label>Paste your data here (tab or comma separated, with header row)</label>
      <textarea id="paste-area" placeholder="Date&#9;Bookmaker&#9;Exchange&#9;Type&#9;Result&#9;What&#9;P&L&#9;John Bet&#9;...">${rawText}</textarea>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="processStep1()">Parse data →</button>
      <span id="s1-msg" style="font-size:12px;color:var(--red)"></span>
    </div>
  </div>`;
}

function processStep1(){
  rawText=(document.getElementById('paste-area')?.value||'').trim();
  if(!rawText){document.getElementById('s1-msg').textContent='Please paste your data first.';return;}

  const lines=rawText.split('\n').map(l=>l.trimEnd()).filter(l=>l.trim());
  if(lines.length<2){document.getElementById('s1-msg').textContent='Need at least a header row plus data rows.';return;}

  // Detect separator — tab or comma
  const sep=lines[0].includes('\t')?'\t':',';
  const headers=lines[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,''));

  // Validate key headers
  const required=['Date','Bookmaker','Type','Result','P&L'];
  const missing=required.filter(r=>!headers.includes(r));
  if(missing.length){document.getElementById('s1-msg').textContent=`Missing columns: ${missing.join(', ')}`;return;}

  // Parse rows
  const rows=[];
  lines.slice(1).forEach(line=>{
    const vals=line.split(sep).map(v=>v.trim().replace(/^"|"$/g,''));
    const row={};headers.forEach((h,i)=>row[h]=vals[i]||'');
    if(Object.values(row).some(v=>v!==''))rows.push(row);
  });

  if(!rows.length){document.getElementById('s1-msg').textContent='No data rows found.';return;}

  // Build preview transactions
  preview=[];
  rows.forEach((row,ri)=>{
    const date=parseDate(row['Date']);
    const bookie=(row['Bookmaker']||'').trim();
    const exchange=(row['Exchange']||'').trim();
    const type=mapType(row['Type']||'');
    const result=mapResult(row['Result']||'');
    const event=(row['What']||'').trim();
    const totalPnl=parseNum(row['P&L']);

    // Find accounts with a stake on this row
    const stakers=[];
    let totalStake=0;
    PROFILES.forEach(pr=>{
      const betCol=ACCT_COLS[pr]?.bet;
      const stake=parseNum(row[betCol]);
      if(stake>0){stakers.push({pr,stake});totalStake+=stake;}
    });

    if(stakers.length===0)return; // skip rows with no stakes

    stakers.forEach(({pr,stake})=>{
      const pnl=totalStake>0?parseFloat(((stake/totalStake)*totalPnl).toFixed(2)):0;
      const retCol=ACCT_COLS[pr]?.ret;
      const ret=parseNum(row[retCol]);
      const bodds=ret>0&&stake>0?parseFloat((ret/stake).toFixed(2)):0;

      preview.push({
        id:Date.now()+Math.random(),
        _acct:pr,_src:ri+2,
        date,type,bookie,exchange,event,
        bstake:stake,bodds,comm:0,
        result,pnl,notes:'Imported',
      });
    });
  });

  if(!preview.length){document.getElementById('s1-msg').textContent='No valid bets found — check your column names match exactly.';return;}

  step=2;render();
}

// ── STEP 2: Preview ───────────────────────────────────────────────────────────
function renderStep2(){
  const counts={};PROFILES.forEach(p=>counts[p]=preview.filter(t=>t._acct===p).length);
  const totalPnl=preview.reduce((a,t)=>a+(t.pnl||0),0);
  const won=preview.filter(t=>t.result==='Won').length;
  const lost=preview.filter(t=>t.result==='Lost').length;

  return`
  <div class="card">
    <div class="card-title"><span class="step-num done">1</span>Data parsed</div>
    <div style="font-size:12px;color:var(--green)">✓ ${preview.length} transactions ready to import</div>
  </div>
  <div class="card">
    <div class="card-title"><span class="step-num">2</span>Preview — check before importing</div>
    <div class="result-grid">
      ${PROFILES.map(p=>`<div class="result-card"><div class="num" style="color:${p==='me'?'var(--blue)':p==='wife'?'var(--purple)':p==='bp'?'var(--orange)':'var(--lime)'}">${counts[p]||0}</div><div class="lbl">${PROFILE_LABELS[p]}</div></div>`).join('')}
      <div class="result-card"><div class="num" style="color:var(--green)">${won}</div><div class="lbl">Won</div></div>
      <div class="result-card"><div class="num" style="color:var(--red)">${lost}</div><div class="lbl">Lost</div></div>
      <div class="result-card"><div class="num" style="font-size:16px;color:${totalPnl>=0?'var(--green)':'var(--red)'}">${fmtS(totalPnl)}</div><div class="lbl">Total P&L</div></div>
    </div>
    <div class="info-box">Balances will <strong>not</strong> be changed — this is history only. Fix balances manually in Accounts after importing.</div>
    <div class="preview-wrap">
      <table class="preview-table">
        <thead><tr><th>Row</th><th>Acct</th><th>Date</th><th>Type</th><th>Bookie</th><th>Event</th><th>Stake</th><th>Odds</th><th>Result</th><th>P&L</th></tr></thead>
        <tbody>
          ${preview.slice(0,300).map(t=>{
            const pnlCol=(t.pnl||0)>0?'pos':(t.pnl||0)<0?'neg':'neu';
            const resStr=t.result==='Won'?'<span style="color:var(--green);font-weight:700">✓ Won</span>':'<span style="color:var(--red);font-weight:700">✗ Lost</span>';
            return`<tr>
              <td style="color:var(--text3)">${t._src}</td>
              <td>${acctPill(t._acct)}</td>
              <td>${t.date}</td>
              <td><span class="${pillClass(t.type)}">${t.type}</span></td>
              <td style="font-weight:600;font-family:'Syne',sans-serif">${t.bookie||'—'}</td>
              <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2);font-family:'Syne',sans-serif">${t.event||'—'}</td>
              <td>£${t.bstake}</td>
              <td>${t.bodds||'—'}</td>
              <td style="font-family:'Syne',sans-serif">${resStr}</td>
              <td class="${pnlCol}">${fmtS(t.pnl)}</td>
            </tr>`;
          }).join('')}
          ${preview.length>300?`<tr><td colspan="10" style="text-align:center;color:var(--text3);padding:10px;font-family:'Syne',sans-serif">... and ${preview.length-300} more</td></tr>`:''}
        </tbody>
      </table>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="doImport()">Import ${preview.length} bets →</button>
      <button class="btn btn-ghost" onclick="step=1;render()">← Start over</button>
    </div>
  </div>`;
}

// ── STEP 3: Import ────────────────────────────────────────────────────────────
async function doImport(){
  document.getElementById('app').innerHTML=`
  <div class="card" style="text-align:center;padding:40px">
    <div style="font-size:32px;margin-bottom:14px">⏳</div>
    <div style="font-size:15px;font-weight:700;margin-bottom:6px">Importing ${preview.length} bets…</div>
    <div style="font-size:12px;color:var(--text3)">Loading current data from server</div>
    <div class="sync-row" style="justify-content:center;margin-top:16px"><div class="sync-dot syncing" id="sync-dot"></div><span id="sync-label">Connecting…</span></div>
  </div>`;

  try{
    // Load current state from server
    const loadRes=await fetch('/api/load');
    if(!loadRes.ok)throw new Error('Failed to load current data');
    const loadJson=await loadRes.json();

    document.getElementById('sync-label').textContent='Merging data…';

    let state=loadJson.data||{};

    // Ensure all profiles exist
    const EXCHANGES=['Betfair','Smarkets','Matchbook','Betdaq'];
    if(!state.exchanges){state.exchanges={};EXCHANGES.forEach(e=>state.exchanges[e]=0);}
    ['me','wife','bp','rq'].forEach(pr=>{
      if(!state[pr])state[pr]={bookies:{},bank:0,transactions:[]};
      if(!state[pr].transactions)state[pr].transactions=[];
    });

    // Add imported transactions — history only, no balance changes
    let imported=0;
    preview.forEach(t=>{
      const p=state[t._acct];
      if(!p)return;
      // Ensure bookie exists in account
      if(t.bookie&&!p.bookies[t.bookie])p.bookies[t.bookie]={bal:0,status:'Active',notes:''};
      p.transactions.push({
        id:t.id,
        date:t.date,
        type:t.type,
        bookie:t.bookie,
        exchange:t.exchange,
        event:t.event,
        bstake:t.bstake,
        bodds:t.bodds,
        comm:0,
        result:t.result,
        pnl:t.pnl,
        notes:'Imported',
        _acct:t._acct,
      });
      imported++;
    });

    document.getElementById('sync-label').textContent='Saving to server…';

    // Save back
    const saveRes=await fetch('/api/save',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(state)
    });
    if(!saveRes.ok)throw new Error('Failed to save');

    // Success
    const counts={};PROFILES.forEach(p=>counts[p]=preview.filter(t=>t._acct===p).length);
    importResult={success:true,imported,counts};
    step=3;render();

  }catch(e){
    document.getElementById('app').innerHTML=`
    <div class="card">
      <div class="error-box">⚠ Import failed: ${e.message}</div>
      <button class="btn btn-ghost" onclick="step=2;render()">← Back</button>
    </div>`;
  }
}

function renderStep3(){
  if(!importResult)return'';
  return`
  <div class="success-box">✓ Import complete — ${importResult.imported} bets added to EdgeTrack</div>
  <div class="result-grid">
    <div class="result-card"><div class="num">${importResult.imported}</div><div class="lbl">Imported</div></div>
    ${PROFILES.map(p=>`<div class="result-card"><div class="num" style="font-size:18px;color:${p==='me'?'var(--blue)':p==='wife'?'var(--purple)':p==='bp'?'var(--orange)':'var(--lime)'}">${importResult.counts[p]||0}</div><div class="lbl">${PROFILE_LABELS[p]}</div></div>`).join('')}
  </div>
  <div class="card">
    <div class="card-title"><span class="step-num done">3</span>Done — what to do next</div>
    <div style="font-size:13px;color:var(--text2);line-height:2">
      <div>1. Go back to EdgeTrack and check the <strong style="color:var(--text)">History</strong> tab — all your imported bets are there</div>
      <div>2. Check the <strong style="color:var(--text)">Reports</strong> tab — monthly P&L charts will now be populated</div>
      <div>3. Go to <strong style="color:var(--text)">Accounts</strong> and manually set your current bookie balances to match reality</div>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap">
      <a href="/" class="btn btn-primary" style="text-decoration:none;display:inline-flex;align-items:center">← Go to EdgeTrack</a>
      <button class="btn btn-ghost" onclick="step=1;rawText='';preview=[];importResult=null;render()">Import another batch</button>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
